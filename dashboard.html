<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyMind — Dashboard</title>
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/dashboard.css" />
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="./img/logo-studymind.png" alt="StudyMind" height="32">
    </div>

    <div class="sidebar-divider"></div>

    <nav class="sidebar-nav">
      <a class="nav-item active" href="./dashboard.html">
        <span class="nav-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="9" width="4" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/>
            <rect x="6" y="5" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.4"/>
            <rect x="11" y="1" width="4" height="14" rx="1" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </span>
        Dashboard
      </a>
      <a class="nav-item" href="./roadmap.html">
        <span class="nav-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 3l4 2 5-3 5 2v9l-5-2-5 3-4-2V3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <line x1="5" y1="5" x2="5" y2="14" stroke="currentColor" stroke-width="1.4"/>
            <line x1="10" y1="2" x2="10" y2="11" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </span>
        Roadmap
      </a>
      <a class="nav-item" href="#">
        <span class="nav-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="12" height="14" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <line x1="5" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="5" y1="9" x2="11" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="5" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        Matérias
      </a>
      <a class="nav-item" href="#">
        <span class="nav-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1.5" y="1.5" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Tarefas
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name">Usuário</div>
          <div class="sidebar-user-role">Estudante</div>
        </div>
      </div>
      <button class="btn-logout" onclick="Auth.logout()">Sair da conta</button>
    </div>
  </aside>

  <!-- ── Main content ── -->
  <main class="main-content">

    <!-- Header -->
    <div class="dashboard-header fade-in-up">
      <h1 class="greeting" id="greeting">Bom dia, Estudante</h1>
      <div class="dashboard-meta" id="dashboard-meta">
        <span class="meta-badge">Carregando...</span>
      </div>
    </div>

    <!-- Metrics row -->
    <div class="metrics-grid fade-in-up">

      <div class="card metric-card" id="metric-questoes">
        <div class="metric-header">
          <span class="metric-label">Total de Questões</span>
          <span class="metric-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="2" width="12" height="14" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
              <line x1="6" y1="6" x2="12" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="6" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="6" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </span>
        </div>
        <div class="metric-value skeleton" style="width:80px;height:32px;border-radius:6px;">&nbsp;</div>
        <div class="metric-sub skeleton" style="width:100px;height:14px;border-radius:4px;margin-top:6px;">&nbsp;</div>
      </div>

      <div class="card metric-card" id="metric-acerto">
        <div class="metric-header">
          <span class="metric-label">Taxa de Acerto</span>
          <span class="metric-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="9" cy="9" r="4" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
            </svg>
          </span>
        </div>
        <div class="metric-value skeleton" style="width:60px;height:32px;border-radius:6px;">&nbsp;</div>
        <div class="metric-sub skeleton" style="width:100px;height:14px;border-radius:4px;margin-top:6px;">&nbsp;</div>
      </div>

      <div class="card metric-card" id="metric-topicos">
        <div class="metric-header">
          <span class="metric-label">Tópicos Estudados</span>
          <span class="metric-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="2,14 6,9 10,11 16,4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="12,4 16,4 16,8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
        <div class="metric-value skeleton" style="width:70px;height:32px;border-radius:6px;">&nbsp;</div>
        <div class="metric-sub skeleton" style="width:100px;height:14px;border-radius:4px;margin-top:6px;">&nbsp;</div>
      </div>

    </div>

    <!-- Content grid -->
    <div class="content-grid">

      <!-- Left: Tasks -->
      <div>
        <!-- Progress bar -->
        <div class="week-progress" id="week-progress">
          <div class="progress-info">
            <div class="progress-text">Progresso da semana</div>
            <div class="progress-nums" id="progress-nums">0 de 0 concluídas</div>
            <div class="progress-bar" style="margin-top:8px;">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
          </div>
          <div class="progress-pct" id="progress-pct">0%</div>
        </div>

        <!-- Tasks header -->
        <div class="section-header">
          <h2 class="section-title">Tarefas desta semana</h2>
          <span class="section-count" id="task-count">carregando...</span>
        </div>

        <!-- Tasks list -->
        <div class="tasks-list" id="tasks-list">
          <div class="skeleton task-skeleton"></div>
          <div class="skeleton task-skeleton"></div>
          <div class="skeleton task-skeleton"></div>
        </div>
      </div>

      <!-- Right column -->
      <div class="right-column">

        <!-- Weak topics -->
        <div class="topics-card">
          <div class="section-header">
            <h2 class="section-title">Tópicos para focar</h2>
            <span style="width:18px;height:18px;display:flex;align-items:center;color:var(--text-muted);">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 1L2 9h6l-1 6 7-8H8l1-6z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
          <div class="topics-list" id="topicos-list">
            <div class="skeleton" style="height:48px;border-radius:6px;"></div>
            <div class="skeleton" style="height:48px;border-radius:6px;"></div>
            <div class="skeleton" style="height:48px;border-radius:6px;"></div>
          </div>
        </div>

        <!-- Quick links -->
        <div class="quick-links">
          <div class="section-header">
            <h2 class="section-title">Acesso rápido</h2>
          </div>
          <a class="quick-link" href="./roadmap.html">
            <span class="quick-link-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 3l4 2 5-3 5 2v9l-5-2-5 3-4-2V3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <line x1="5" y1="5" x2="5" y2="14" stroke="currentColor" stroke-width="1.4"/>
                <line x1="10" y1="2" x2="10" y2="11" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            </span>
            Ver roadmap completo
            <span class="quick-link-arrow">→</span>
          </a>
          <button class="quick-link" onclick="window.location.reload()">
            <span class="quick-link-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2.5A7 7 0 1114.5 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <polyline points="12,1 14,3.5 11.5,5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            Atualizar dados
            <span class="quick-link-arrow">→</span>
          </button>
          <button class="quick-link" onclick="Auth.logout()">
            <span class="quick-link-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 11v2.5A1.5 1.5 0 018.5 15h-5A1.5 1.5 0 012 13.5v-11A1.5 1.5 0 013.5 1h5A1.5 1.5 0 0110 2.5V5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="7" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <polyline points="12,6 14,8 12,10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            Sair da conta
            <span class="quick-link-arrow">→</span>
          </button>
        </div>

      </div>
    </div>

  </main>
</div>

<script src="./js/api.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/dashboard.js"></script>
</body>
</html>
