<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyMind — Configurando seu plano</title>
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/chat.css" />
</head>
<body>

<div class="chat-page">

  <!-- ── Header ── -->
  <header class="chat-header">
    <div class="chat-header-brand">
      <img src="./img/logo-studymind.png" alt="StudyMind" height="32">
    </div>

    <div class="chat-header-progress">
      <span class="progress-label">Configurando seu plano</span>
      <div class="progress-steps">
        <div class="progress-step done"></div>
        <div class="progress-step done"></div>
        <div class="progress-step active"></div>
        <div class="progress-step"></div>
      </div>
    </div>

    <div class="chat-header-actions">
      <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Sair</button>
    </div>
  </header>

  <!-- ── Messages ── -->
  <div class="chat-messages" id="chat-messages">
    <!-- Messages injected by JS -->
  </div>

  <!-- ── Input area ── -->
  <div class="chat-input-area">
    <div class="chat-input-wrapper">
      <textarea
        id="chat-input"
        class="chat-input"
        placeholder="Digite sua resposta..."
        rows="1"
      ></textarea>
      <button id="chat-send-btn" class="chat-send-btn" title="Enviar (Enter)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9h12M10 4l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <p class="chat-input-hint">Pressione Enter para enviar · Shift+Enter para nova linha</p>
  </div>

</div>

<script src="./js/api.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/chat.js"></script>
</body>
</html>
